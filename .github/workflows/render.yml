name: Render Minu Organics Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    name: Render MP4
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            ca-certificates \
            fonts-liberation \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libglib2.0-0 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libx11-6 \
            libxcomposite1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxrandr2 \
            libxshmfence1

      - name: Render video
        run: npx remotion render MinuOrganicsDemo output/minu-final.mp4 --log=verbose
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser

      - name: Upload rendered video
        uses: actions/upload-artifact@v4
        with:
          name: minu-organics-video
          path: output/minu-final.mp4
          retention-days: 7
